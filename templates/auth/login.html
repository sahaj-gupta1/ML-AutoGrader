{% extends 'base.html' %}
{% block title %}Login — ML AutoGrader{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center py-3">
                <h4 class="mb-0">🤖 ML AutoGrader</h4>
                <small class="text-muted">Sign in to your account</small>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Sign In</button>
                </form>
            </div>
            <div class="card-footer text-center py-3 bg-light">
                <small>
                    Student?
                    <a href="{{ url_for('register_student') }}">Register here</a>
                    &nbsp;|&nbsp;
                    Faculty?
                    <a href="{{ url_for('register_teacher') }}">Apply for access</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
